name: Amazon Price Monitor

on:
  schedule:
    # Runs every 30 minutes. GitHub may delay scheduled runs by several
    # minutes during high load — that's normal, not a bug.
    - cron: "*/30 * * * *"
  workflow_dispatch:  # adds a "Run workflow" button on the Actions tab

# Workflow needs to commit price_history.json back to the repo
permissions:
  contents: write

# Don't allow two checks to run concurrently — they'd race on price_history.json
concurrency:
  group: price-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price check
        env:
          PROXIES: ${{ secrets.PROXIES }}
          APPRISE_URLS: ${{ secrets.APPRISE_URLS }}
        run: python check_once.py

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add price_history.json
          if git diff --staged --quiet; then
            echo "No price history changes — skipping commit"
          else
            git commit -m "Update price history [skip ci]"
            git push
          fi
